<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4285f4"/>
      <stop offset="0.5" stop-color="#9b72cb"/>
      <stop offset="1" stop-color="#d96570"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- White background matching /ask -->
  <rect width="1080" height="1350" fill="#ffffff"/>

  <!-- Subtle colored glow blobs (very soft, like /ask's ambient gradient) -->
  <circle cx="200" cy="200" r="280" fill="#4285f4" opacity="0.04"/>
  <circle cx="900" cy="1100" r="320" fill="#d96570" opacity="0.04"/>

  <!-- Top eyebrow label -->
  <text x="540" y="170" text-anchor="middle" font-size="26" font-weight="600" fill="#9b72cb" letter-spacing="10">
    3:00 AM · DUBAI
  </text>

  <!-- Main headline -->
  <text x="540" y="310" text-anchor="middle" font-size="92" font-weight="700" fill="#1f1f1f" letter-spacing="-2">
    My phone buzzed.
  </text>
  <text x="540" y="410" text-anchor="middle" font-size="92" font-weight="700" fill="url(#accent)" letter-spacing="-2">
    I didn't book it.
  </text>

  <!-- Phone notification mock -->
  <g transform="translate(140, 520)" filter="url(#softShadow)">
    <rect x="0" y="0" width="800" height="260" rx="28" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>

    <!-- Google Meet icon -->
    <g transform="translate(44, 44)">
      <rect x="0" y="0" width="80" height="80" rx="18" fill="#f8f9fa" stroke="#e8eaed" stroke-width="1"/>
      <path d="M24 28 L52 28 Q56 28 56 32 L56 52 Q56 56 52 56 L24 56 Q20 56 20 52 L20 32 Q20 28 24 28 Z" fill="#00ac47"/>
      <path d="M56 38 L68 30 L68 54 L56 46 Z" fill="#00832d"/>
      <circle cx="38" cy="42" r="4" fill="#ffffff"/>
    </g>

    <!-- Notification text -->
    <text x="160" y="72" font-size="26" font-weight="700" fill="#1f1f1f">Google Calendar</text>
    <text x="160" y="110" font-size="22" fill="#5f6368">now</text>

    <text x="44" y="170" font-size="28" font-weight="600" fill="#1f1f1f">30 min with Inder</text>
    <text x="44" y="210" font-size="22" fill="#5f6368">Thu, 3:00 PM IST · Google Meet invite sent</text>
  </g>

  <!-- Subhead -->
  <text x="540" y="870" text-anchor="middle" font-size="34" fill="#5f6368" font-weight="400">
    Someone asked my AI for a call.
  </text>
  <text x="540" y="920" text-anchor="middle" font-size="34" fill="#5f6368" font-weight="400">
    It just booked it.
  </text>

  <!-- Footer brand block -->
  <g transform="translate(0, 1120)">
    <line x1="140" y1="0" x2="940" y2="0" stroke="#e8eaed" stroke-width="1"/>

    <text x="540" y="70" text-anchor="middle" font-size="44" font-weight="700" fill="#1f1f1f" letter-spacing="0">
      Mahesh Inder
    </text>
    <text x="540" y="120" text-anchor="middle" font-size="26" fill="#5f6368" letter-spacing="4">
      FULL STACK AI ENGINEER
    </text>

    <!-- CTA pill -->
    <g transform="translate(370, 160)">
      <rect x="0" y="0" width="340" height="60" rx="30" fill="url(#accent)"/>
      <text x="170" y="40" text-anchor="middle" font-size="24" font-weight="600" fill="#ffffff" letter-spacing="1">
        maheshinder.in/ask
      </text>
    </g>
  </g>
</svg>
