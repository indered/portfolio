# Render Blueprint - Full MERN Stack Deployment
# https://render.com/docs/blueprint-spec
#
# Single service: Node.js server serves both API and static client build
# This keeps relative /api/ URLs working without CORS issues

services:
  - type: web
    name: mahesh-portfolio
    runtime: node
    region: singapore  # Closest to Dubai
    plan: free
    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REFRESH_TOKEN
        sync: false
    healthCheckPath: /api/health
