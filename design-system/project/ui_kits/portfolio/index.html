<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahesh Inder — Portfolio UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;1,400;1,500&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; color: #E8E4DE; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.04); } }
  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .orbits-spin { animation: rotate 180s linear infinite; }
  .scene-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 50%, #1a1530 0%, #0a0514 50%, #000 100%); z-index: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Starfield.jsx"></script>
<script type="text/babel" src="PlanetDock.jsx"></script>
<script type="text/babel" src="Masthead.jsx"></script>
<script type="text/babel" src="CompactLogo.jsx"></script>
<script type="text/babel" src="PersonaView.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState('hub'); // 'hub' or a planet id

  return (
    <div>
      <div className="scene-bg" />
      <Starfield />
      {view === 'hub' && (
        <>
          <div style={{ position: 'fixed', inset: 0, zIndex: 1 }}>
            <CenterSun />
            <div className="orbits-spin" style={{ position: 'absolute', inset: 0 }}>
              <PlanetOrbits onClick={setView} />
            </div>
          </div>
          <Masthead />
          <CompactLogo />
        </>
      )}
      {view !== 'hub' && (
        <PersonaView personaId={view} onBack={() => setView('hub')} />
      )}
      <PlanetDock activeId={view === 'hub' ? null : view} onNavigate={setView} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
