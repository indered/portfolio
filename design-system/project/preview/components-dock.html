<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Planet Dock</title><link rel="stylesheet" href="_base.css"></head>
<body style="padding:30px;display:flex;align-items:center;justify-content:center;">
<div style="display:flex;align-items:flex-end;gap:16px;padding:10px 22px 12px;background:rgba(0,0,0,0.4);backdrop-filter:blur(20px);border-radius:44px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 24px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.06);">
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#2a7fe0 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 18px 5px #2a7fe0,inset 0 0 10px rgba(0,0,0,0.25);outline:2px solid rgba(255,255,255,0.55);outline-offset:2px;font-size:1.3rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5));">💻</button>
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#c44b28 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 8px 2px #c44b2844,inset 0 0 10px rgba(0,0,0,0.25);font-size:1.3rem;">🏃</button>
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#8BA370 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 8px 2px #8BA37044,inset 0 0 10px rgba(0,0,0,0.25);font-size:1.3rem;">🚀</button>
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#e8a855 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 8px 2px #e8a85544,inset 0 0 10px rgba(0,0,0,0.25);font-size:1.3rem;">🎵</button>
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#e0527a 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 8px 2px #e0527a44,inset 0 0 10px rgba(0,0,0,0.25);font-size:1.3rem;">💘</button>
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#c8a070 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 8px 2px #c8a07044,inset 0 0 10px rgba(0,0,0,0.25);font-size:1.3rem;">🌐</button>
<button style="width:52px;height:52px;border-radius:50%;border:none;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#8b7d6b 32%,rgba(0,0,0,0.18) 68%,transparent 100%);box-shadow:0 0 8px 2px #8b7d6b44,inset 0 0 10px rgba(0,0,0,0.25);font-size:1.3rem;">📖</button>
</div>
</body></html>
