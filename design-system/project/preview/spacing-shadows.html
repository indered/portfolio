<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Shadows · Glows</title><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">
<div><div style="height:72px;background:#1E1C18;border:1px solid rgba(255,255,255,0.08);border-radius:12px;"></div><div class="mono" style="margin-top:8px;">resting · no shadow</div></div>
<div><div style="height:72px;background:#1E1C18;border:1px solid #22d3ee;border-radius:12px;box-shadow:0 0 15px rgba(0,255,204,0.1), inset 0 0 15px rgba(0,255,204,0.05);"></div><div class="mono" style="margin-top:8px;">hover · inset glow</div></div>
<div><div style="height:72px;background:radial-gradient(circle at 34% 30%,rgba(255,255,255,0.82) 0%,#2a7fe0 32%,rgba(0,0,0,0.18) 68%,transparent 100%);border-radius:12px;box-shadow:0 0 24px 8px #2a7fe0cc, inset 0 0 10px rgba(0,0,0,0.25);"></div><div class="mono" style="margin-top:8px;">planet glow</div></div>
</div>
</body></html>
