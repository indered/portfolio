<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing</title><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:8px;align-items:end;">
<div><div style="height:2px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">2xs · 2</div></div>
<div><div style="height:4px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">xs · 4</div></div>
<div><div style="height:8px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">sm · 8</div></div>
<div><div style="height:16px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">md · 16</div></div>
<div><div style="height:24px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">lg · 24</div></div>
<div><div style="height:32px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">xl · 32</div></div>
<div><div style="height:48px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">2xl · 48</div></div>
<div><div style="height:64px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">3xl · 64</div></div>
<div><div style="height:96px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">4xl · 96</div></div>
<div><div style="height:128px;background:#22d3ee;"></div><div class="mono" style="margin-top:6px;">5xl · 128</div></div>
</div>
</body></html>
