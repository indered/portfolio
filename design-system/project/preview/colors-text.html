<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Palette — Text</title><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
  <div><div style="height:68px;background:#f4f4f5;border-radius:10px;"></div><div class="mono" style="margin-top:8px;">text-primary · dark</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;">#f4f4f5</div></div>
  <div><div style="height:68px;background:#a1a1aa;border-radius:10px;"></div><div class="mono" style="margin-top:8px;">text-secondary · dark</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;">#a1a1aa</div></div>
  <div><div style="height:68px;background:#71717a;border-radius:10px;"></div><div class="mono" style="margin-top:8px;">text-tertiary · dark</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;">#71717a</div></div>
  <div><div style="height:68px;background:#1a1a24;border-radius:10px;"></div><div class="mono" style="margin-top:8px;">text-primary · light</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;">#1a1a24</div></div>
  <div><div style="height:68px;background:#5a5a6e;border-radius:10px;"></div><div class="mono" style="margin-top:8px;">text-secondary · light</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;">#5a5a6e</div></div>
  <div><div style="height:68px;background:#8a8a9a;border-radius:10px;"></div><div class="mono" style="margin-top:8px;">text-tertiary · light</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;">#8a8a9a</div></div>
</div>
</body></html>
